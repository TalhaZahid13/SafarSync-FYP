name: safarsync_mobileapp
description: "A new Flutter project."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  lucide_icons_flutter: ^1.0.0
  pdf: ^3.11.3
  printing: ^5.10.0
  intl: ^0.18.1
  flutter_vector_icons: ^2.0.0
  cupertino_icons: ^1.0.8
  flutter_native_splash: ^2.4.3
  flutter_launcher_icons: ^0.13.1 
  provider: ^6.0.5 # MVVM k liye state management
  google_fonts: ^4.0.4 # Acha font use karne ke liye
  flutter_svg: ^2.0.7 # SVG images (logo) use karne ke liye
  animate_do: ^4.2.0
  shared_preferences: ^2.5.3
  cached_network_image: ^3.4.1
  flutter_screenutil: ^5.9.0
  awesome_dialog: ^3.2.1
  animated_bottom_navigation_bar: ^1.4.0
  shimmer: ^3.0.0
  socket_io_client: ^3.1.2
  image_picker: ^1.0.4
  permission_handler: ^11.3.1
  flutter_image_compress: ^2.1.0
  http: ^1.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png

flutter_native_splash:
  color: "#ffffff"
  image: assets/images/logo.png
  android: true
  ios: true
  web: false
  android_12:
    image: assets/images/logo.png
    color: "#ffffff"

flutter_icons:
  android: true
  ios: true
  image_path: assets/images/logo.png
