name: safarsync_mobileapp
description: "A new Flutter project."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  lucide_icons_flutter: ^1.0.0
  pdf: ^3.11.3
  printing: ^5.10.0
  intl: ^0.18.1
  flutter_vector_icons: ^2.0.0
  cupertino_icons: ^1.0.8
  flutter_native_splash: ^2.4.3
  flutter_launcher_icons: ^0.13.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png

flutter_native_splash:
  color: "#ffffff"
  image: assets/images/logo.png
  android: true
  ios: true
  web: false
  android_12:
    image: assets/images/logo.png
    color: "#ffffff"

flutter_icons:
  android: true
  ios: true
  image_path: assets/images/logo.png
